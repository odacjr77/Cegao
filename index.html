<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cegão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       P1 — ENTRADA
  ══════════════════════════════════════════ -->
  <div id="p1" class="page active">

    <div class="p1-bg">
      <div class="p1-blur-1"></div>
      <div class="p1-blur-2"></div>
    </div>

    <div class="p1-content">
      <div class="p1-logo">
        <span class="p1-logo-icon">🫙</span>
        <h1 class="p1-logo-text">Cegão</h1>
      </div>

      <div class="p1-tagline">
        <p class="p1-tag-top">Degustação às cegas</p>
        <p class="p1-tag-main">Você sabe o que<br>está bebendo?</p>
        <p class="p1-tag-sub">Prove. Chute. Descubra.</p>
      </div>

      <div class="p1-form">
        <div class="p1-input-wrap">
          <label class="p1-label">Seu nome</label>
          <input id="ent-nome" class="p1-input" type="text"
                 placeholder="Como quer ser chamado"
                 maxlength="40" autocomplete="off" />
        </div>
        <div class="p1-input-wrap">
          <label class="p1-label">
            Telefone
            <span class="p1-opt">opcional</span>
          </label>
          <input id="ent-tel" class="p1-input" type="tel"
                 placeholder="(11) 99999-9999"
                 maxlength="20" autocomplete="tel" />
        </div>
        <button class="p1-btn" onclick="entrar()">
          <span>Entrar</span>
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════
       P2 — CAMPEONATOS
  ══════════════════════════════════════════ -->
  <div id="p2" class="page">

    <header class="topbar">
      <button class="topbar-back" onclick="voltarP1()">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="topbar-user" id="topbar-user"></div>
    </header>

    <div class="p2-hero">
      <p class="p2-eyebrow">Escolha uma rodada</p>
      <h2 class="p2-title">Campeonatos<br>disponíveis</h2>
    </div>

    <div class="p2-list" id="p2-list"></div>

  </div>

  <!-- ══════════════════════════════════════════
       P3 — VOTAÇÃO
  ══════════════════════════════════════════ -->
  <div id="p3" class="page">

    <header class="topbar">
      <button class="topbar-back" onclick="voltarP2()">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="topbar-camp" id="topbar-camp"></div>
    </header>

    <div class="p3-inner">
      <p class="p3-instrucao">Para cada bebida que você provou, escreva o nome que acha que é:</p>
      <div id="p3-campos" class="p3-campos"></div>
      <button class="p3-btn-enviar" id="btn-enviar" onclick="enviarTodos()">
        Enviar votos
      </button>
    </div>

    <!-- Tela de aguardo (após envio) -->
    <div id="p3-aguardo" class="p3-aguardo hidden">
      <div class="agu-emoji">🎭</div>
      <h3 class="agu-titulo">Votos registrados!</h3>
      <p class="agu-sub">Aguarde o administrador<br>revelar os resultados.</p>
      <button class="agu-btn" onclick="checarResultados()">Verificar resultados</button>
    </div>

    <!-- Tela de resultados -->
    <div id="p3-resultado" class="p3-resultado hidden">
      <div class="res-header">
        <h3 class="res-titulo">Resultados 🏆</h3>
      </div>
      <div id="res-gab" class="res-gab"></div>
      <div id="res-rank" class="res-rank"></div>
    </div>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js"></script>
</body>
</html>
